server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: cualquier ruta que no sea un archivo físico
  # se sirve como index.html para que react-router tome el control.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache largo + immutable para assets con hash en el nombre
  # (Vite emite `assets/index-abc123.js` etc.).
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html NUNCA se cachea: cada deploy puede cambiar su contenido
  # y queremos que el browser lo pida siempre.
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Compresión gzip para reducir el peso de los assets
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    image/svg+xml;

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
